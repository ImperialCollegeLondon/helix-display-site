<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Read a Publication Summary from the UK DRI Centre for Care Research & Technology." />
  <title>Publication Summary | Helix Centre</title>
  <link rel="icon" href="helix-logo.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <a class="brand-block" href="index.html" aria-label="Publication Summaries home">
        <img class="brand-logo" src="helix-logo.png" alt="Helix Centre logo" />
        <span class="brand-copy">
          <span class="brand-kicker">Helix Centre</span>
          <span class="brand-title">Publication Summaries</span>
          <span class="brand-sub-subtitle">Centre for Care Research &amp; Technology, UK Dementia Research Institute</span>
        </span>
      </a>
    </header>

    <main class="page-content">
      <div class="back-link-row">
        <a class="m3-button m3-button--tonal back-button" href="index.html">&larr; Back to summaries</a>
      </div>

      <article id="entry-header" aria-labelledby="entry-title">
        <div class="entry-hero-image-wrap">
          <img id="entry-image" class="entry-hero-image" alt="" loading="lazy" />
        </div>

        <div class="entry-article">
          <h1 id="entry-title">Loading...</h1>
          <p id="entry-meta" class="entry-meta">Loading...</p>

          <div id="entry-keywords" class="entry-keywords" hidden></div>

          <p id="short-description-content" class="entry-lede">Loading...</p>

          <h2>Summary</h2>
          <div id="lay-summary-content" class="entry-summary">Loading...</div>

          <div id="entry-gallery" class="entry-gallery" hidden></div>

          <dl id="entry-details" class="entry-details" hidden></dl>
        </div>
      </article>

      <div class="back-link-row back-link-row--bottom">
        <a class="m3-button m3-button--tonal back-button" href="index.html">&larr; Back to summaries</a>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="embed.js"></script>
  <script src="entry.js"></script>
</body>
</html>
