<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Browse Publication Summaries from the UK DRI Centre for Care Research & Technology." />
  <title>Publication Summaries | Helix Centre</title>
  <link rel="icon" href="helix-logo.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="table-embed">
  <div class="app-shell">
    <main class="page-content" aria-label="Publication table">
      <section class="table-card" aria-label="Publication summaries">
        <div class="table-card__header">
          <div>
            <p id="results-count" class="muted-text">Loading...</p>
          </div>

          <div class="table-actions">
            <label class="visually-hidden" for="search-input">Search submissions</label>
            <input id="search-input" class="m3-input" type="search" placeholder="Search title, team, or type" autocomplete="off" />
          </div>
        </div>

        <div id="filter-bar" class="filter-bar" hidden>
          <span class="filter-bar__label">Keyword</span>
          <span class="filter-chip">
            <span id="active-keyword-label"></span>
            <button class="filter-chip__remove" id="clear-filter-btn" aria-label="Clear keyword filter">&times;</button>
          </span>
        </div>

        <div class="table-wrap">
          <table class="m3-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Corresponding team member</th>
                <th>Lab or team</th>
                <th>Source type</th>
                <th>Project / publication date</th>
              </tr>
            </thead>
            <tbody id="submissions-body">
              <tr>
                <td colspan="5" class="loading-cell">Loading submissions...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="embed.js"></script>
  <script src="script.js"></script>
</body>
</html>
