<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Browse Publication Summaries by keyword." />
  <title>Related Publication Summaries | Helix Centre</title>
  <link rel="icon" href="helix-logo.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <main class="page-content">
      <section class="hero-card" aria-labelledby="keyword-page-title">
        <p class="eyebrow">Related research</p>
        <h1 id="keyword-page-title">Keyword</h1>
        <p class="hero-text">Showing related Accessible AI Assisted Summaries for this keyword.</p>
      </section>

      <section class="table-card" aria-labelledby="related-title">
        <div class="table-card__header">
          <div>
            <h2 id="related-title">Related summaries</h2>
          </div>
        </div>

        <div class="table-wrap">
          <table class="m3-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Theme</th>
                <th>Publication Date</th>
              </tr>
            </thead>
            <tbody id="keyword-submissions-body">
              <tr>
                <td colspan="3" class="loading-cell">Loading submissions...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="embed.js"></script>
  <script src="keyword.js"></script>
</body>
</html>
